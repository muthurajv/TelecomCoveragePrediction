project:
  gcp_project_id: "verizon-pci-prod"
  gcp_region: "us-central1"
  gcs_bucket: "verizon-pci-data"

h3_grid:
  urban:
    resolution: 8        # ~0.74 km² average cell area
  suburban:
    resolution: 7        # ~5.16 km² average cell area
  rural:
    resolution: 7        # ~5.16 km² average cell area

  # Partition key prefix length for BigQuery clustering
  # First 2 hex chars of H3 index = rough geographic region
  partition_prefix_length: 2

crs:
  default: "EPSG:4326"

markets:
  - id: "nyc"
    name: "New York City"
    density_tier: "urban"
    h3_resolution: 8
    bbox:
      min_lat: 40.4774
      max_lat: 40.9176
      min_lon: -74.2591
      max_lon: -73.7004

  - id: "la"
    name: "Los Angeles"
    density_tier: "urban"
    h3_resolution: 8
    bbox:
      min_lat: 33.7037
      max_lat: 34.3373
      min_lon: -118.6682
      max_lon: -117.6464

  - id: "chicago"
    name: "Chicago"
    density_tier: "urban"
    h3_resolution: 8
    bbox:
      min_lat: 41.6445
      max_lat: 42.0230
      min_lon: -87.9401
      max_lon: -87.5240

  - id: "dallas"
    name: "Dallas-Fort Worth"
    density_tier: "suburban"
    h3_resolution: 7
    bbox:
      min_lat: 32.5182
      max_lat: 33.2148
      min_lon: -97.4785
      max_lon: -96.4632

feature_engineering:
  temporal:
    feature_lookback_days: 90
    label_lookahead_days: 180

  rf_thresholds:
    weak_signal_rsrp_dbm: -110
    poor_sinr_db: -3

  density_radius_km: 5.0

  propagation_model: "hata"   # hata | cost231

bigquery:
  dataset_raw: "pci_raw"
  dataset_curated: "pci_curated"
  dataset_features: "pci_features"
  dataset_scoring: "pci_scoring"
  dataset_reporting: "pci_reporting"

  feature_table: "h3_features_snapshot"
  scoring_table: "coverage_opportunity_scores"
  build_list_table: "ranked_build_list"
  shap_table: "shap_values"
  scenario_table: "scenario_scores"
